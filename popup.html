<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS Trial Task Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-root">
    <header class="popup-header">
      <h1>Trial Task Manager</h1>
      <button id="btnCheckUpdates" class="btn btn-secondary" type="button">Check Update</button>
    </header>

    <section id="updateBanner" class="update-banner hidden" aria-live="polite"></section>

    <footer class="popup-footer">
      <div id="statusText" class="status-text" aria-live="polite"></div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
