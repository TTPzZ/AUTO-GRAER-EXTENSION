<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zalo Cloud Manager</title>
  <link rel="stylesheet" href="quill.snow.css">
  <style>
    :root {
      --bg-color: #f4f7fb;
      --text-color: #172b4d;
      --primary: #0052cc;
      --primary-hover: #0047b3;
      --border-color: #dfe1e6;
      --accent: #d93025;
      --accent-hover: #a50e0e;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    h2 {
      margin-top: 0;
      color: #102a43;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
    }

    h3 {
      color: #243b53;
      margin-top: 20px;
      margin-bottom: 15px;
    }

    .btn-main, .btn-danger {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      width: 100%;
    }
    .btn-main:hover { background-color: var(--primary-hover); }
    .btn-danger { background-color: var(--accent); }
    .btn-danger:hover { background-color: var(--accent-hover); }

    .layout-split {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-top: 20px;
    }

    .tree-panel {
      flex: 1;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
    }

    .editor-panel {
      flex: 2;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      min-height: 400px;
      position: sticky;
      top: 20px;
    }

    .tree-course { margin-bottom: 15px; }
    .tree-course-title {
      font-weight: bold;
      font-size: 15px;
      color: #0056b3;
      padding: 8px;
      background: #e9ecef;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .tree-lesson-list {
      margin: 5px 0 0 15px;
      list-style-type: none;
      padding: 0;
    }
    
    .tree-lesson-item {
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid transparent;
    }
    .tree-lesson-item:hover { background: #f1f3f5; }
    .tree-lesson-item.active {
      background: #e3f2fd;
      border-color: #90caf9;
      font-weight: bold;
    }
    
    .badge {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 12px;
      font-weight: bold;
    }
    .badge.has-data { background: #d4edda; color: #155724; }
    .badge.no-data { background: #f8d7da; color: #721c24; }

    #editor-container { height: 300px; background: #fff; font-size: 14px; }
    
    .editor-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #666;
      z-index: 10;
      border-radius: 8px;
    }

    .status-msg { margin-left: 10px; font-weight: bold; font-size: 13px; color: #28a745; align-self: center; }

    @media (max-width: 980px) {
      .layout-split { flex-direction: column; }
      .editor-panel { position: static; width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Quản lý Ngân hàng Báo cáo Zalo (Cloud)</h2>
    <div class="note" style="margin-bottom: 15px; color: #555;">Hệ thống tự động đồng bộ theo 4 cụm máy chủ. Bấm vào từng <b>Buổi</b> ở cột trái để điền nội dung.</div>

    <div class="layout-split">
      <div class="tree-panel" id="treeContainer">
        <div style="text-align:center; padding:50px 0; color:#888;">Đang đồng bộ dữ liệu Cloud...</div>
      </div>

      <div class="editor-panel" style="position: relative;">
        <div id="editorBlocker" class="editor-overlay">Hãy chọn một Buổi ở cây thư mục để bắt đầu soạn</div>

        <div style="color:#0056b3; font-weight:bold; font-size:18px; margin-bottom:5px;" id="lblEditorPath">Đang chọn: Chưa có</div>
        <div style="color:#888; font-size:12px; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;" id="lblEditorTarget">Server: Chưa xác định</div>

        <label style="display:block; margin-bottom:5px; font-weight:bold;">Nội dung chi tiết (gửi qua Zalo):</label>
        <div id="editor-container"></div>

        <div style="display:flex; gap:10px; margin-top:15px;">
          <button id="btnSaveData" class="btn-main">Lưu lên Cloud</button>
          <button id="btnDeleteData" class="btn-danger" style="display:none; width:120px;">Xóa</button>
          <span id="cloudStatus" class="status-msg"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="quill.js"></script>
  <script src="options.js"></script>
</body>
</html>
